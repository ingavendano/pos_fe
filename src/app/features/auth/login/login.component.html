<!-- Full-screen gradient background -->
<div class="min-h-screen flex flex-col justify-center items-center relative overflow-hidden py-12 px-4"
     style="background: linear-gradient(135deg, var(--color-login-bg-from) 0%, var(--color-login-bg-to) 100%)">

  <!-- Decorative blurry orbs for depth -->
  <div class="absolute top-[-10%] left-[-5%] w-72 h-72 rounded-full opacity-20 blur-3xl pointer-events-none"
       style="background: white"></div>
  <div class="absolute bottom-[-10%] right-[-5%] w-96 h-96 rounded-full opacity-15 blur-3xl pointer-events-none"
       style="background: white"></div>
  <div class="absolute top-[40%] right-[10%] w-48 h-48 rounded-full opacity-10 blur-2xl pointer-events-none"
       style="background: white"></div>

  <!-- Card with glassmorphism -->
  <div class="relative w-full max-w-md">
    <div class="bg-white/10 backdrop-blur-md rounded-3xl border border-white/20 shadow-2xl overflow-hidden">

      <!-- Header with logo -->
      <div class="pt-10 pb-6 px-8 flex flex-col items-center text-center">

        <!-- Animated logo icon -->
        <div class="w-20 h-20 rounded-2xl flex items-center justify-center mb-5 shadow-lg"
             style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35)">
          <svg class="w-10 h-10 text-white drop-shadow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
        </div>

        <h1 class="text-2xl font-bold text-white tracking-tight drop-shadow">
          {{ tenantInfo()?.name || 'Punto de Venta' }}
        </h1>
        @if (subdomain()) {
          <p class="mt-1.5 text-sm font-medium text-white/70 tracking-wide">
            {{ subdomain() }}
          </p>
        }
        <p class="mt-2 text-white/55 text-sm">Ingresa tus credenciales para continuar</p>
      </div>

      <!-- Form area -->
      <div class="px-8 pb-10 bg-white rounded-b-3xl">
        <!-- Error message -->
        @if (errorMessage()) {
          <div class="mt-6 mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded-xl">
            <div class="flex">
              <svg class="h-5 w-5 text-red-400 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                  clip-rule="evenodd" />
              </svg>
              <p class="ml-3 text-sm text-red-700">{{ errorMessage() }}</p>
            </div>
          </div>
        }

        <form class="space-y-5 mt-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

          <!-- Usuario -->
          <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">
              Usuario
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"
                   style="color: var(--color-accent-text)">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </div>
              <input id="username" type="text" formControlName="username"
                autocomplete="username" required
                class="login-input block w-full pl-11 pr-4 py-3 border-2 rounded-xl
                       text-sm placeholder-gray-400 bg-gray-50 transition-all
                       focus:outline-none focus:bg-white"
                style="border-color: #E5E7EB"
                placeholder="Escribe tu usuario"
                [class.border-red-400]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
            </div>
          </div>

          <!-- Contraseña -->
          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">
              Contraseña
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"
                   style="color: var(--color-accent-text)">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <input id="password" type="password" formControlName="password"
                autocomplete="current-password" required
                class="login-input block w-full pl-11 pr-4 py-3 border-2 rounded-xl
                       text-sm placeholder-gray-400 bg-gray-50 transition-all
                       focus:outline-none focus:bg-white"
                style="border-color: #E5E7EB"
                placeholder="••••••••">
            </div>
          </div>

          <!-- CTA Button -->
          <button type="submit"
            [disabled]="loginForm.invalid || isSubmitting()"
            class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl mt-2
                   text-base font-bold text-white transition-all
                   hover:shadow-lg hover:opacity-90 active:scale-[0.98]
                   disabled:opacity-60 disabled:cursor-not-allowed"
            style="background: linear-gradient(135deg, var(--color-login-bg-from) 0%, var(--color-login-bg-to) 100%)">
            @if (isSubmitting()) {
              <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
              Verificando...
            } @else {
              Ingresar al turno
            }
          </button>
        </form>
      </div>
    </div>

    <!-- Subtle branding footer -->
    <p class="text-center mt-5 text-white/40 text-xs">Sistema POS Multi-tenant</p>
  </div>
</div>
