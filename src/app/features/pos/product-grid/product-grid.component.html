<div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-8">
  @for (product of products(); track product.id) {
  <!-- Product Card -->
  <button (click)="onProductSelect(product, $event)" [disabled]="getAvailableStock(product) <= 0"
    class="group relative flex flex-col items-start p-4 bg-white border-2 border-gray-100 rounded-2xl shadow-sm
           hover:shadow-lg transition-all duration-200 text-left focus:outline-none
           active:scale-[0.98] h-full disabled:opacity-50 disabled:cursor-not-allowed"
    style="--hover-border: var(--color-card-hover-border)"
    [style.borderColor]="''"
    [ngClass]="{'opacity-50 cursor-not-allowed': getAvailableStock(product) <= 0}">

    <!-- Hover colored top bar -->
    <div class="absolute inset-x-0 top-0 h-0.5 rounded-t-2xl opacity-0 group-hover:opacity-100 transition-opacity"
         style="background: var(--color-card-hover-border)"></div>

    <!-- Image area -->
    <div class="w-full aspect-square bg-gray-50 rounded-xl mb-4 overflow-hidden relative border border-gray-100">
      @if (product.imageUrl) {
        <img [src]="product.imageUrl" [alt]="product.name"
          class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
          (error)="$any($event.target).style.display='none'">
      } @else {
        <div
          class="absolute inset-0 flex items-center justify-center text-gray-300 group-hover:scale-105 transition-transform duration-300">
          <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
            </path>
          </svg>
        </div>
      }
    </div>

    <div class="flex-1 flex flex-col w-full">
      <h3 class="font-semibold text-gray-800 line-clamp-1 mb-1 text-sm leading-snug">{{ product.name }}</h3>
      <p class="font-bold mt-auto text-lg" style="color: var(--color-accent-text)">
        {{ product.price | currency:tenantService.getCurrencyCode():'symbol-narrow' }}
      </p>
    </div>

    <!-- Dynamic Stock Badge -->
    <div
      class="absolute bottom-4 right-4 px-2 py-0.5 rounded-lg text-[10px] font-bold text-white shadow-sm transition-colors"
      [ngClass]="{
                 'bg-emerald-500': getAvailableStock(product) > (product.minStock || 0),
                 'bg-orange-500': getAvailableStock(product) <= (product.minStock || 0) && getAvailableStock(product) > 0,
                 'bg-red-500': getAvailableStock(product) <= 0
               }">
      {{ getAvailableStock(product) }}
    </div>
  </button>
  } @empty {
  @if (catalogueService.isLoading()) {
  <div
    class="col-span-full py-12 flex flex-col items-center justify-center text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200">
    <svg class="animate-spin w-12 h-12 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none"
      viewBox="0 0 24 24" style="color: var(--color-primary-500)">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
      </path>
    </svg>
    <p class="font-medium">Cargando productos...</p>
  </div>
  } @else if (catalogueService.error()) {
  <div
    class="col-span-full py-8 flex flex-col items-center justify-center text-red-500 bg-red-50 border border-red-200 rounded-2xl">
    <p class="font-bold mb-1">Error al cargar el catálogo</p>
    <p class="text-sm mb-3">{{ catalogueService.error() }}</p>
    <button (click)="catalogueService.loadCatalogue()"
      class="px-4 py-1.5 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 text-sm">Reintentar</button>
  </div>
  } @else {
  <div class="col-span-full py-12 text-center text-gray-500 bg-white rounded-2xl border border-dashed border-gray-200">
    No hay productos disponibles en esta categoría.
  </div>
  }
  }

</div>
