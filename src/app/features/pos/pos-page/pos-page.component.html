<div class="h-full flex flex-col lg:flex-row bg-gray-50 overflow-hidden relative">

  @if (!tableService.activeTable()) {
    <!-- Vista de selección de mesas -->
    <div class="flex-1 w-full h-full p-6">
      <app-tables-grid></app-tables-grid>
    </div>

  } @else {
    <!-- Vista de productos y orden -->
    <div class="flex-1 flex flex-col overflow-hidden h-full">

      <!-- Header de mesa + categorías -->
      <div class="bg-white px-5 pt-4 pb-0 border-b border-gray-100 z-10 shrink-0">

        <!-- Info de mesa -->
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <!-- Botón volver -->
            <button (click)="tableService.clearSelection()"
              class="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100
                     rounded-lg transition-colors active:scale-95">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
              </svg>
            </button>

            <div class="flex items-center gap-2">
              <h1 class="text-xl font-bold text-gray-900">
                Mesa {{ tableService.activeTable()?.number }}
              </h1>
              <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                    [class.bg-emerald-100]="tableService.activeTable()?.status === 'AVAILABLE'"
                    [class.text-emerald-700]="tableService.activeTable()?.status === 'AVAILABLE'"
                    [class.bg-amber-100]="tableService.activeTable()?.status !== 'AVAILABLE'"
                    [class.text-amber-700]="tableService.activeTable()?.status !== 'AVAILABLE'">
                {{ tableService.activeTable()?.status === 'AVAILABLE' ? 'Libre' : 'Orden abierta' }}
              </span>
            </div>
          </div>
        </div>

        <!-- Filtro de categorías -->
        <app-category-filter class="block"></app-category-filter>
      </div>

      <!-- Grid de productos scrollable -->
      <div class="flex-1 overflow-y-auto p-5 scroll-smooth">
        <app-product-grid
          [products]="catalogueService.filteredProducts()"
          (productSelected)="onProductSelected($event)">
        </app-product-grid>
      </div>
    </div>

    <!-- Panel derecho: Ticket de orden -->
    <div class="w-full lg:w-[380px] xl:w-[420px] shrink-0
                border-l border-gray-100 bg-white
                h-[52vh] lg:h-full
                flex flex-col
                absolute bottom-0 lg:relative z-20">

      <!-- Drag handle (solo móvil) -->
      <div class="flex justify-center py-2 lg:hidden w-full cursor-grab active:cursor-grabbing
                  bg-white rounded-t-2xl border-b border-gray-50
                  shadow-[0_-6px_12px_-2px_rgba(0,0,0,0.08)]">
        <div class="w-10 h-1 bg-gray-200 rounded-full"></div>
      </div>

      <app-order-ticket
        class="h-full block flex-1 overflow-hidden"
        (orderProcessed)="onOrderProcessed()">
      </app-order-ticket>
    </div>
  }

</div>
