<div class="h-full flex flex-col bg-gray-50 overflow-hidden">

  @if (!tableService.activeTable()) {
    <!-- Vista de selección de mesas -->
    <div class="flex-1 w-full h-full overflow-y-auto p-4 md:p-6">
      <app-tables-grid></app-tables-grid>
    </div>

  } @else {

    <!-- ============================================================ -->
    <!-- MOBILE: Tab switcher bar                                      -->
    <!-- ============================================================ -->
    <div class="flex lg:hidden shrink-0 bg-white border-b border-gray-100 shadow-sm">
      <button (click)="mobileView.set('products')"
        class="flex-1 flex items-center justify-center gap-2 py-3 text-sm font-bold transition-all"
        [class.text-gray-900]="mobileView() === 'products'"
        [class.border-b-2]="mobileView() === 'products'"
        [class.border-indigo-600]="mobileView() === 'products'"
        [class.text-gray-400]="mobileView() !== 'products'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>
        Productos
      </button>

      <button (click)="mobileView.set('ticket')"
        class="flex-1 flex items-center justify-center gap-2 py-3 text-sm font-bold transition-all relative"
        [class.text-gray-900]="mobileView() === 'ticket'"
        [class.border-b-2]="mobileView() === 'ticket'"
        [class.border-indigo-600]="mobileView() === 'ticket'"
        [class.text-gray-400]="mobileView() !== 'ticket'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        Comanda
        @if (cartService.items().length > 0) {
          <span class="absolute top-2 right-8 w-5 h-5 rounded-full text-[10px] font-black text-white flex items-center justify-center"
                style="background: var(--color-primary-600)">
            {{ cartService.items().length }}
          </span>
        }
      </button>
    </div>

    <!-- ============================================================ -->
    <!-- LAYOUT: Flex row en desktop, tabs en mobile                   -->
    <!-- ============================================================ -->
    <div class="flex-1 flex overflow-hidden min-h-0">

      <!-- ── PRODUCTOS (izquierda en desktop / tab en mobile) ─────── -->
      <div class="flex-1 flex flex-col overflow-hidden min-h-0"
           [class.hidden]="mobileView() !== 'products'"
           [class.lg:flex]="true">

        <!-- Sub-header: info de mesa + categorías -->
        <div class="bg-white px-4 md:px-5 pt-4 pb-0 border-b border-gray-100 shrink-0">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <!-- Botón volver a mesas -->
              <button (click)="clearTable()"
                class="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors active:scale-95"
                title="Volver a mesas">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
              </button>
              <h1 class="text-lg md:text-xl font-bold text-gray-900">
                Mesa {{ tableService.activeTable()?.number }}
              </h1>
              <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                    [class.bg-emerald-100]="tableService.activeTable()?.status === 'AVAILABLE'"
                    [class.text-emerald-700]="tableService.activeTable()?.status === 'AVAILABLE'"
                    [class.bg-amber-100]="tableService.activeTable()?.status !== 'AVAILABLE'"
                    [class.text-amber-700]="tableService.activeTable()?.status !== 'AVAILABLE'">
                {{ tableService.activeTable()?.status === 'AVAILABLE' ? 'Libre' : 'Orden abierta' }}
              </span>
            </div>
          </div>
          <app-category-filter class="block"></app-category-filter>
        </div>

        <!-- Grid de productos (scrollable) -->
        <div class="flex-1 overflow-y-auto p-4 md:p-5 scroll-smooth min-h-0">
          <app-product-grid
            [products]="catalogueService.filteredProducts()"
            (productSelected)="onProductSelected($event)">
          </app-product-grid>
        </div>
      </div>

      <!-- ── COMANDA (derecha en desktop / tab en mobile) ──────────── -->
      <div class="w-full lg:w-[380px] xl:w-[420px] shrink-0 flex flex-col overflow-hidden min-h-0
                  border-l border-gray-100 bg-white"
           [class.hidden]="mobileView() !== 'ticket'"
           [class.lg:flex]="true">

        <!-- Back button (solo visible en mobile, dentro del ticket) -->
        <div class="flex lg:hidden items-center gap-2 px-4 py-2 border-b border-gray-100 bg-gray-50 shrink-0">
          <button (click)="mobileView.set('products')"
            class="flex items-center gap-1.5 text-sm font-semibold text-indigo-600 active:scale-95 transition-transform py-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            Volver a productos
          </button>
        </div>

        <app-order-ticket
          class="flex-1 block overflow-hidden min-h-0"
          (orderProcessed)="onOrderProcessed()">
        </app-order-ticket>
      </div>

    </div>
  }

</div>
