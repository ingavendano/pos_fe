<div class="h-full flex flex-col lg:flex-row bg-gray-50 overflow-hidden relative">
      
      @if (!tableService.activeTable()) {
        <!-- Tables Selection View -->
        <div class="flex-1 w-full h-full p-6">
          <app-tables-grid></app-tables-grid>
        </div>
      } @else {
        <!-- Products & Catalog View -->
        <div class="flex-1 flex flex-col overflow-hidden h-full">
          <!-- Top area: Selected Table & Categories -->
          <div class="bg-white px-6 pt-4 border-b border-gray-200 shadow-sm z-10 shrink-0">
            <!-- Table Header info -->
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center">
                <button (click)="tableService.clearSelection()" class="mr-3 p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors active:scale-95">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div class="flex items-baseline space-x-2">
                  <h1 class="text-2xl font-black text-gray-800 tracking-tight">Mesa {{ tableService.activeTable()?.number }}</h1>
                  <span class="px-2.5 py-0.5 rounded-full bg-emerald-100 text-emerald-800 text-xs font-bold uppercase tracking-wider">
                    {{ tableService.activeTable()?.status === 'AVAILABLE' ? 'Libre' : 'Orden Abierta' }}
                  </span>
                </div>
              </div>
            </div>
            <!-- Dynamic Categories Filter -->
            <app-category-filter class="block"></app-category-filter>
          </div>

          <!-- Main Content: Scrollable Product Grid -->
          <div class="flex-1 overflow-y-auto p-6 scroll-smooth">
            <app-product-grid 
              [products]="catalogueService.filteredProducts()" 
              (productSelected)="onProductSelected($event)">
            </app-product-grid>
          </div>
        </div>

        <!-- Right Side Panel: Order Ticket -->
        <div class="w-full lg:w-[400px] xl:w-[450px] shrink-0 border-l border-gray-200 bg-white shadow-xl lg:shadow-none h-[50vh] lg:h-full flex flex-col absolute bottom-0 lg:relative z-20">
          <!-- Mobile drag handle indication -->
          <div class="flex justify-center py-2 lg:hidden w-full cursor-grab active:cursor-grabbing bg-white rounded-t-3xl border-b border-gray-100 shadow-[0_-8px_15px_-3px_rgba(0,0,0,0.1)]">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
          </div>
          
          <app-order-ticket class="h-full block flex-1 overflow-hidden" (orderProcessed)="onOrderProcessed()"></app-order-ticket>
        </div>
      }
    </div>
