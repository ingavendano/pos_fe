<div class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide py-2">
  <!-- "All" category pill -->
  <button (click)="selectCategory(null)"
    [class]="catalogueService.activeCategoryId() === null ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-700 hover:bg-gray-50 border border-gray-200'"
    class="whitespace-nowrap px-6 py-2.5 rounded-full font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
    Todo
  </button>

  @if (catalogueService.isLoading()) {
  <!-- Skeleton loaders -->
  <div class="w-24 h-10 bg-gray-200 rounded-full animate-pulse"></div>
  <div class="w-32 h-10 bg-gray-200 rounded-full animate-pulse"></div>
  <div class="w-28 h-10 bg-gray-200 rounded-full animate-pulse"></div>
  } @else if (catalogueService.error()) {
  <div class="text-red-500 text-sm flex items-center bg-red-50 px-4 py-1.5 rounded-full border border-red-100">
    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    Error cargando categorías
  </div>
  } @else {
  <!-- Dynamic categories -->
  @for (category of catalogueService.categories(); track category.id) {
  <button (click)="selectCategory(category.id!)"
    [class]="catalogueService.activeCategoryId() === category.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-700 hover:bg-gray-50 border border-gray-200'"
    class="whitespace-nowrap px-6 py-2.5 rounded-full font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
    {{ category.name }}
  </button>
  }
  }
</div>
