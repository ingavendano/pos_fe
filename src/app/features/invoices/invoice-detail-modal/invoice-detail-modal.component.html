<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" (click)="close.emit()">
  </div>

  <!-- Modal Content -->
  <div
    class="bg-white rounded-2xl shadow-xl w-full max-w-lg relative z-10 flex flex-col max-h-[90vh] overflow-hidden animate-fade-in">

    <!-- Header -->
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
      <div>
        <h2 class="text-xl font-bold text-gray-800">Detalle de Comanda #{{ order.consecutiveNumber || order.id }}</h2>
        <p class="text-sm text-gray-500 mt-0.5">{{ order.createdAt | date:'dd MMM yyyy, HH:mm' }}</p>
      </div>
      <button (click)="close.emit()"
        class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors active:scale-95">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Body: Unified Ticket -->
    <div class="p-6 overflow-y-auto flex-1 bg-gray-50 border-y border-gray-100">
      <app-invoice-ticket *ngIf="order" [order]="order" [paymentMethod]="order.invoice?.paymentMethod || 'CASH'"
        [customer]="order.customer?.name"></app-invoice-ticket>
    </div>

    <!-- Footer Actions -->
    <div class="p-6 border-t border-gray-100 flex flex-wrap gap-3 bg-gray-50/50">
      <button (click)="close.emit()"
        class="flex-1 py-2.5 px-4 bg-white border border-gray-300 text-gray-700 font-medium rounded-xl hover:bg-gray-50 transition-colors min-w-[100px]">
        Cerrar
      </button>
      <button (click)="printPreCount()"
        class="flex-1 py-2.5 px-4 bg-amber-500 text-white font-medium rounded-xl hover:bg-amber-600 transition-colors flex justify-center items-center shadow-sm min-w-[120px]">
        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Pre-Cuenta
      </button>
      <button (click)="printInvoice()"
        class="flex-1 py-2.5 px-4 bg-indigo-600 text-white font-medium rounded-xl hover:bg-indigo-700 transition-colors flex justify-center items-center shadow-sm min-w-[120px]">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
        </svg>
        Imprimir Factura
      </button>
    </div>
  </div>
</div>
