<header class="bg-white/90 backdrop-blur-sm border-b border-gray-100 h-14 flex items-center justify-between px-5 z-10 sticky top-0 shadow-sm">

  <!-- Búsqueda -->
  <div class="flex items-center gap-2 flex-1">
    <button class="flex items-center gap-2 px-3 py-1.5 bg-gray-50 hover:bg-gray-100
                   border border-gray-200 rounded-xl transition-all text-gray-400
                   hover:border-gray-300 hover:shadow-sm
                   hidden md:flex"
      style="min-width: 220px">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
           style="color: var(--color-primary-500)">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <span class="text-sm">Buscar...</span>
      <kbd class="ml-auto text-[10px] bg-white border border-gray-200 rounded-md px-1.5 py-0.5 text-gray-400 font-mono">
        ⌘K
      </kbd>
    </button>
  </div>

  <!-- Acciones -->
  <div class="flex items-center gap-3">

    <!-- Estado de caja -->
    <div class="hidden md:flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium"
         [class.bg-green-50]="registerIsOpen()"
         [class.text-green-700]="registerIsOpen()"
         [class.bg-red-50]="!registerIsOpen()"
         [class.text-red-600]="!registerIsOpen()">
      <div class="w-1.5 h-1.5 rounded-full"
           [class.bg-green-500]="registerIsOpen()"
           [class.bg-red-400]="!registerIsOpen()">
      </div>
      {{ registerIsOpen() ? 'Caja abierta' : 'Caja cerrada' }}
    </div>

    <div class="w-px h-5 bg-gray-200 hidden md:block"></div>

    <!-- Notificaciones -->
    <button class="relative p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100
                   rounded-lg transition-colors focus:outline-none">
      <span class="absolute top-1 right-1 w-2 h-2 rounded-full border-2 border-white"
            style="background: var(--color-primary-600)"></span>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
    </button>

    <!-- Avatar + dropdown -->
    <div class="relative group">
      <button class="flex items-center gap-2.5 focus:outline-none">
        <!-- Avatar -->
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
             style="background: var(--color-primary-600)">
          {{ authService.currentUser()?.name?.charAt(0)?.toUpperCase() || 'U' }}
        </div>
        <!-- Info (solo desktop) -->
        <div class="hidden md:block text-left">
          <p class="text-xs font-semibold text-gray-800 leading-none">
            {{ authService.currentUser()?.name }}
          </p>
          <p class="text-[10px] text-gray-400 mt-0.5 leading-none">
            {{ authService.currentUser()?.branchName || 'Global' }}
          </p>
        </div>
        <!-- Chevron -->
        <svg class="w-3.5 h-3.5 text-gray-400 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- Dropdown -->
      <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100
                  opacity-0 invisible group-hover:opacity-100 group-hover:visible
                  transition-all duration-150 z-50">
        <!-- Info del usuario -->
        <div class="px-4 py-3 border-b border-gray-50">
          <p class="text-xs font-semibold text-gray-800">{{ authService.currentUser()?.name }}</p>
          <p class="text-[11px] text-gray-400 mt-0.5">{{ authService.currentUser()?.role }}</p>
        </div>
        <ul class="py-1">
          <li>
            <button (click)="authService.logout()"
              class="w-full text-left px-4 py-2 text-sm text-red-600
                     hover:bg-red-50 transition-colors flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>

  </div>
</header>
