<header class="bg-white border-b h-16 flex items-center justify-between px-6 z-10 sticky top-0">

  <!-- Search / Actions -->
  <div class="flex items-center flex-1">
    <div class="relative w-full max-w-md hidden md:block">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3">
        <svg class="w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none">
          <path
            d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </span>
      <input type="text"
        class="w-full py-2 pl-10 pr-4 text-gray-700 bg-gray-50 outline-none rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all border border-transparent focus:border-indigo-500 placeholder-gray-400"
        placeholder="Buscar pedidos, facturas...">
    </div>
  </div>

  <!-- User Profile & Notifications -->
  <div class="flex items-center gap-4">

    <!-- Notifications button -->
    <button class="relative p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors focus:outline-none">
      <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
        </path>
      </svg>
    </button>

    <!-- Current Branch identifier -->
    <div
      class="hidden md:flex items-center justify-center px-4 py-1.5 bg-indigo-50 text-indigo-700 text-sm font-semibold rounded-full border border-indigo-100">
      {{ authService.currentUser()?.branchName || 'Global' }}
    </div>

    <!-- User avatar & Dropdown -->
    <div class="relative group">
      <button class="flex items-center focus:outline-none">
        <div class="w-10 h-10 overflow-hidden border-2 border-gray-200 rounded-full">
          <div
            class="flex items-center justify-center w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 text-white font-bold text-sm">
            {{ authService.currentUser()?.name?.charAt(0) || 'U' }}
          </div>
        </div>
        <div class="hidden ml-3 md:block text-left">
          <p class="text-sm font-medium text-gray-700">{{ authService.currentUser()?.name }}</p>
          <p class="text-xs text-gray-500">{{ authService.currentUser()?.role }}</p>
        </div>
      </button>

      <!-- Dropdown Menu -->
      <div
        class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
        <ul class="py-1">
          <li>
            <button (click)="authService.logout()"
              class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors flex items-center">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
              </svg>
              Cerrar Sesión
            </button>
          </li>
        </ul>
      </div>
    </div>

  </div>
</header>
