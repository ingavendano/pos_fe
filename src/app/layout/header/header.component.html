<header class="glass h-16 md:h-20 flex items-center justify-between px-4 md:px-8 z-30 sticky top-0 transition-all overflow-visible shadow-glass"
        style="border-bottom: 1px solid rgba(255, 255, 255, 0.1)">

  <div class="flex items-center gap-3 flex-1">
    <!-- Hamburger button (mobile only) -->
    <button (click)="sidebarService.toggleMobile()"
            class="flex md:hidden items-center justify-center w-9 h-9 rounded-xl bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all active:scale-95"
            aria-label="Abrir menú">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <!-- Search (hidden on mobile, visible md+) -->
    <div class="relative hidden md:flex items-center w-full max-w-sm group">
      <svg class="absolute left-3 w-4 h-4 text-gray-400 group-focus-within:text-[var(--color-primary-500)] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input type="text" placeholder="Buscar..."
             class="w-full pl-10 pr-4 py-2 bg-gray-50/50 border border-transparent
                    rounded-2xl text-sm transition-all focus:bg-white focus:border-[var(--color-primary-500)]
                    focus:ring-4 focus:ring-[var(--color-primary-500)]/10 outline-none shadow-inner">
      <kbd class="absolute right-3 hidden lg:flex items-center text-[10px] bg-white border border-gray-200 rounded-md px-1.5 py-0.5 text-gray-400 font-mono shadow-sm">
        ⌘K
      </kbd>
    </div>
  </div>

  <!-- Acciones -->
  <div class="flex items-center gap-2 md:gap-3">

    <!-- Estado de caja (hidden on mobile) -->
    <div class="hidden sm:flex items-center gap-2 px-3.5 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-sm border"
         [class.bg-green-50/50]="registerIsOpen()"
         [class.border-green-100]="registerIsOpen()"
         [class.text-green-600]="registerIsOpen()"
         [class.bg-red-50/50]="!registerIsOpen()"
         [class.border-red-100]="!registerIsOpen()"
         [class.text-red-600]="!registerIsOpen()">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
              [class.bg-green-400]="registerIsOpen()"
              [class.bg-red-400]="!registerIsOpen()"></span>
        <span class="relative inline-flex rounded-full h-2 w-2"
              [class.bg-green-500]="registerIsOpen()"
              [class.bg-red-500]="!registerIsOpen()"></span>
      </span>
      {{ registerIsOpen() ? 'En línea' : 'Cerrado' }}
    </div>

    <div class="w-px h-5 bg-gray-200 hidden sm:block"></div>

    <!-- Notificaciones -->
    <button class="relative p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100
                   rounded-lg transition-colors focus:outline-none">
      <span class="absolute top-1 right-1 w-2 h-2 rounded-full border-2 border-white bg-[var(--color-primary-600)]"></span>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
    </button>

    <!-- Avatar + dropdown -->
    <div class="relative group">
      <button class="flex items-center gap-2 md:gap-3 focus:outline-none p-1 rounded-full hover:bg-gray-50 transition-all">
        <!-- Avatar -->
        <div class="w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center text-white text-xs font-bold border-2 border-white shadow-sm"
             style="background: black">
          {{ authService.currentUser()?.name?.charAt(0)?.toUpperCase() || 'U' }}
        </div>
        <!-- Info (solo desktop) -->
        <div class="hidden md:block text-left mr-1">
          <p class="text-xs font-bold text-gray-900 leading-none tracking-tight">
            {{ authService.currentUser()?.name }}
          </p>
          <p class="text-[10px] text-gray-400 mt-1 leading-none font-medium">
            {{ authService.currentUser()?.branchName || 'Administración' }}
          </p>
        </div>
        <svg class="w-4 h-4 text-gray-300 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- Dropdown -->
      <div class="absolute right-0 mt-3 w-52 glass rounded-2xl shadow-premium
                  opacity-0 invisible group-hover:opacity-100 group-hover:visible
                  transition-all duration-300 z-50 transform translate-y-2 group-hover:translate-y-0">
        <!-- Info del usuario -->
        <div class="px-4 py-3 border-b border-gray-50">
          <p class="text-xs font-semibold text-gray-800">{{ authService.currentUser()?.name }}</p>
          <p class="text-[11px] text-gray-400 mt-0.5">{{ authService.currentUser()?.role }}</p>
        </div>
        <ul class="py-1">
          <li>
            <button (click)="authService.logout()"
              class="w-full text-left px-4 py-2 text-sm text-red-600
                     hover:bg-red-50 transition-colors flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>

  </div>
</header>
